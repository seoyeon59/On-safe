<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>아이디 찾기</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='login_style.css') }}">
  <style>
    /* 결과 박스 스타일 */
    #idResultSection { display: none; text-align: center; padding: 20px; }
    .found-id { font-size: 20px; font-weight: bold; color: #ff4b2b; margin: 15px 0; }
    .back-btn { background-color: #333 !important; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="login-container">
    <div id="findIdFormSection">
      <h2>아이디 찾기</h2>
      <p>가입 시 등록한 이름과 이메일을 입력하세요.</p>
      <form id="findIdForm">
        <input type="text" id="userName" placeholder="이름" required>
        <input type="email" id="userEmail" placeholder="이메일 주소" required>
        <button type="button" onclick="handleFindId()">아이디 찾기</button>
      </form>
    </div>

    <div id="idResultSection">
      <h2>아이디 확인</h2>
      <p>입력하신 정보와 일치하는 아이디입니다.</p>
      <div class="found-id" id="displayId"></div>
      <button type="button" class="back-btn" onclick="location.href='/'">로그인하러 가기</button>
    </div>

    <div class="login-footer">
      <a href="/">로그인으로 돌아가기</a>
    </div>
  </div>

  <script>
    async function handleFindId() {
      const name = document.getElementById('userName').value;
      const email = document.getElementById('userEmail').value;

      if (!name || !email) {
          alert("이름과 이메일을 모두 입력해주세요.");
          return;
      }

      try {
        // 실제 서버(app.py)에 아이디 찾기 요청
        const response = await fetch(`/api/find-id?name=${encodeURIComponent(name)}&email=${encodeURIComponent(email)}`);
        const data = await response.json();

        if (data.success) {
          // 폼 숨기고 결과 보여주기
          document.getElementById('findIdFormSection').style.display = 'none';
          document.getElementById('idResultSection').style.display = 'block';
          document.getElementById('displayId').textContent = data.user_id;
        } else {
          alert("일치하는 회원 정보가 없습니다.");
        }
      } catch (err) {
        console.error("아이디 찾기 중 오류:", err);
        alert("서버 통신 중 오류가 발생했습니다.");
      }
    }
  </script>
</body>
</html>
