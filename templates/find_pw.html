<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>비밀번호 재설정 - On Safe</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='login_style.css') }}">
  <style>
    .step { display: none; }
    .step.active { display: block; animation: fadeIn 0.4s; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .info-text { margin-bottom: 20px; color: #666; font-size: 0.9rem; line-height: 1.4; }
    .auth-timer { color: #e74c3c; font-size: 0.85rem; margin-top: 5px; text-align: right; }
  </style>
</head>
<body>
  <div class="login-container">
    <div id="step1" class="step active">
      <h2>비밀번호 재설정</h2>
      <p class="info-text">본인 확인을 위해 가입하신<br>아이디와 이메일을 입력해 주세요.</p>
      <form id="verifyForm">
        <input type="text" id="pwUserId" placeholder="아이디" required>
        <input type="email" id="pwEmail" placeholder="이메일 주소" required>
        <button type="button" id="btnSendCode" onclick="handleVerifyUser()">인증 이메일 발송</button>
      </form>
    </div>

    <div id="step2" class="step">
      <h2>인증번호 확인</h2>
      <p class="info-text">입력하신 이메일로 6자리 인증번호가 발송되었습니다.</p>
      <form id="authForm">
        <input type="text" id="authCode" placeholder="인증번호 6자리" maxlength="6" required>
        <div id="timer" class="auth-timer"></div>
        <button type="button" onclick="handleVerifyCode()">인증 완료</button>
      </form>
    </div>

    <div id="step3" class="step">
      <h2>새 비밀번호 설정</h2>
      <p class="info-text">타인이 추측하기 어려운<br>새로운 비밀번호를 설정해 주세요.</p>
      <form id="resetForm">
        <input type="password" id="newPw" placeholder="새 비밀번호 (8자 이상)" required>
        <input type="password" id="newPwConfirm" placeholder="새 비밀번호 확인" required>
        <button type="button" onclick="handleResetPassword()">비밀번호 변경 완료</button>
      </form>
    </div>

    <div class="login-footer">
      <a href="/login">로그인 화면으로 돌아가기</a>
    </div>
  </div>

  <script>
    let tempUserId = ""; // 상태 유지를 위한 전역 변수

    function showStep(stepNum) {
      document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
      document.getElementById('step' + stepNum).classList.add('active');
    }

    // 1단계: 사용자 존재 여부 확인 및 메일 발송
    async function handleVerifyUser() {
      const userId = document.getElementById('pwUserId').value;
      const email = document.getElementById('pwEmail').value;
      const btn = document.getElementById('btnSendCode');

      if(!userId || !email) return alert("아이디와 이메일을 모두 입력하세요.");

      btn.disabled = true;
      btn.textContent = "발송 중...";

      try {
        const response = await fetch(`/api/verify-for-pw?id=${userId}&email=${email}`);
        const data = await response.json();

        if (data.success) {
          tempUserId = userId; // ID 저장
          alert("인증 메일이 발송되었습니다.");
          showStep(2);
        } else {
          alert(data.message || "정보가 일치하지 않습니다.");
        }
      } catch (err) {
        alert("서버 통신 오류가 발생했습니다.");
      } finally {
        btn.disabled = false;
        btn.textContent = "인증 이메일 발송";
      }
    }

    // 2단계: 서버에 코드 확인 요청 (보안상 서버에서 검증해야 함)
    async function handleVerifyCode() {
      const code = document.getElementById('authCode').value;
      if(code.length !== 6) return alert("6자리 번호를 입력하세요.");

      // 실제 사업화 시에는 아래도 fetch로 서버에서 검증하는 것이 좋습니다.
      // 여기서는 테스트를 위해 성공으로 가정하거나 API를 호출합니다.
      if(code === "123456") {
        showStep(3);
      } else {
        alert("인증번호가 올바르지 않습니다.");
      }
    }

    // 3단계: 비밀번호 최종 변경
    async function handleResetPassword() {
      const newPw = document.getElementById('newPw').value;
      const newPwConfirm = document.getElementById('newPwConfirm').value;

      if(newPw.length < 8) return alert("비밀번호는 8자 이상이어야 합니다.");
      if(newPw !== newPwConfirm) return alert("비밀번호 확인이 일치하지 않습니다.");

      const response = await fetch('/api/update-pw', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: tempUserId, new_pw: newPw })
      });

      const data = await response.json();
      if(data.success) {
        alert("비밀번호가 안전하게 변경되었습니다. 다시 로그인해 주세요.");
        location.href = '/login';
      } else {
        alert("변경 실패: " + data.message);
      }
    }
  </script>
</body>
</html>
