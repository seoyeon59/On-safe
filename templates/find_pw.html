<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>비밀번호 재설정 - 낙상 감지 시스템</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='login_style.css') }}">
  <style>
    /* 다단계 폼 제어를 위한 스타일 */
    .step { display: none; }
    .step.active { display: block; }

    /* 기존 스타일과 조화를 이루기 위한 추가 여백 */
    .info-text { margin-bottom: 25px; }

    /* 로딩/성공 메시지 강조 */
    .success-text { color: #007bff; font-weight: bold; margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="login-container">

    <div id="step1" class="step active">
      <h2>비밀번호 재설정</h2>
      <p class="info-text">가입하신 아이디와 이메일 주소를 입력해 주세요.</p>
      <form id="verifyUserForm">
        <input type="text" id="pwUserId" placeholder="아이디" required>
        <input type="email" id="pwEmail" placeholder="이메일 주소" required>
        <button type="button" onclick="handleVerifyUser()">인증번호 발송</button>
      </form>
    </div>

    <div id="step2" class="step">
      <h2>인증번호 확인</h2>
      <p class="info-text">이메일로 발송된 6자리 번호를 입력하세요.</p>
      <form id="verifyCodeForm">
        <input type="text" id="authCode" placeholder="인증번호 6자리" maxlength="6" required>
        <button type="button" onclick="handleVerifyCode()">인증 완료</button>
      </form>
    </div>

    <div id="step3" class="step">
      <h2>새 비밀번호 설정</h2>
      <p class="info-text">새로 사용할 비밀번호를 입력해 주세요.</p>
      <form id="resetPwForm">
        <input type="password" id="newPw" placeholder="새 비밀번호" required>
        <input type="password" id="newPwConfirm" placeholder="새 비밀번호 확인" required>
        <button type="button" onclick="handleResetPassword()">비밀번호 변경 완료</button>
      </form>
    </div>

    <div class="login-footer">
      <a href="/">로그인으로 돌아가기</a>
    </div>
  </div>

  <script>
    // 화면 전환 함수
    function showStep(stepNum) {
      document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
      document.getElementById('step' + stepNum).classList.add('active');
    }

    // 1단계 로직: 사용자 확인 및 인증번호 발송 시뮬레이션
    async function handleVerifyUser() {
      const userId = document.getElementById('pwUserId').value;
      const email = document.getElementById('pwEmail').value;

      if (!userId || !email) {
        alert("정보를 모두 입력해주세요.");
        return;
      }

      // 실제 DB 대신 app_test.py의 API 호출
      const response = await fetch(`/api/verify-for-pw?id=${userId}&email=${email}`);
      const data = await response.json();

      if (data.success) {
        alert("인증번호가 발송되었습니다. (테스트 번호: 123456)");
        showStep(2);
      } else {
        alert("일치하는 회원 정보가 없습니다.");
      }
    }

    // 2단계 로직: 인증번호 검증
    function handleVerifyCode() {
      const code = document.getElementById('authCode').value;
      if (code === '123456') {
        showStep(3);
      } else {
        alert("인증번호가 일치하지 않습니다.");
      }
    }

    // 3단계 로직: 최종 비밀번호 변경 실행
    async function handleResetPassword() {
      const userId = document.getElementById('pwUserId').value; // 1단계에서 입력한 ID 사용
      const newPw = document.getElementById('newPw').value;
      const newPwConfirm = document.getElementById('newPwConfirm').value;

      if (newPw !== newPwConfirm) {
        alert("비밀번호가 서로 일치하지 않습니다.");
        return;
      }

      try {
        const response = await fetch('/api/update-pw', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            id: userId,
            new_pw: newPw
          })
        });

        const data = await response.json();

        if (data.success) {
          alert("비밀번호 변경이 완료되었습니다! 이제 새 비밀번호로 로그인하세요.");
          location.href = '/'; // 로그인 페이지로 이동
        } else {
          alert("오류가 발생했습니다: " + data.message);
        }
      } catch (err) {
        console.error("비밀번호 업데이트 중 에러:", err);
        alert("서버와 통신에 실패했습니다.");
      }
    }
  </script>
</body>
</html>
