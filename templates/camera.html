<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>On Safe - 실시간 모니터링</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='camera_style.css') }}">
</head>

<body>
  <a href="/history" class="history-btn">
    <span class="icon">📁</span> 사고 영상 이력
  </a>

  <div class="settings-container">
    <button id="settingsBtn" class="settings-btn">⚙️</button>
    <div id="settingsDropdown" class="dropdown-content">
        <a href="/profile-edit">✏️ 개인정보 수정</a>
        <a href="/withdrawal" class="withdraw-link">❌ 회원 탈퇴</a>
        <hr>
        <a href="/logout">🚪 로그아웃</a>
    </div>
  </div>

  <div class="container">
    <h1>🚨 실시간 낙상 감지 시스템</h1>

    <div class="main-content">
      <div class="video-section">
        <div class="video-container">
          <img id="videoFeed" src="{{ url_for('video_feed') }}" alt="실시간 스트리밍">
        </div>
        <div id="status" class="status">✅ 시스템 모니터링 중</div>
      </div>

      <div class="score-section">
        <h2>낙상 위험 확률</h2>
        <div class="risk-score" id="riskScore">0%</div>
        <div class="risk-bar">
          <div class="arrow" id="arrow"></div>
        </div>
        <button id="btn119">🚨 119 즉시 신고</button>
      </div>
    </div>

    <div id="popup" class="popup-card">
      <p>119에 신고하시겠습니까?<br><small>모바일에서는 전화로 연결됩니다.</small></p>
      <div class="popup-buttons">
        <button id="confirmBtn" class="btn-confirm">확인</button>
        <button id="cancelBtn" class="btn-cancel">취소</button>
      </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='camera.js') }}"></script>
</body>
</html>
